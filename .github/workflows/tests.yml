name: brew test-bot
on:
  push:
    branches:
      - main
  pull_request:
env:
  HOMEBREW_CHANGE_ARCH_TO_ARM: 1
  # Disable Homebrew's macOS sandbox. With it on, BSD `mv` and shell
  # `>>` redirects inside the mounted sparseimage are restricted, which
  # silently truncates ncurses' configure-time `>>$cf_dir/Makefile`
  # appends and drops mk-1st.awk's libncurses.a rule.
  HOMEBREW_NO_SANDBOX: 1
jobs:
  test-bot:
    runs-on: macos-15
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # OpenSSL v1.1 is deprecated, and `brew doctor` complains about it in two
      # different ways:
      #
      # 1. Some part of the `set-up-homebrew` action modifies the openssl1.1
      #    Formula in the install homebrew-core repository that gets cloned and
      #    then `brew doctor` complains about a non-clean repository.
      # 2. Either as part of the default runner image, or again the
      #    `set-up-homebrew` action, openssl@1.1 gets installed which is
      #    deprecated and thus must also be uninstalled.

      # 1. Cleanup the cloned homebrew-core repo to remove openssl@1.1 formulae.
      - name: Get Homebrew Repo
        run: |
          MY_HOMEBREW_CORE_REPO="$(brew --repo)/Library/Taps/homebrew/homebrew-core"
          echo "MY_HOMEBREW_CORE_REPO=$MY_HOMEBREW_CORE_REPO" >> "$GITHUB_ENV"

      - name: Check Homebrew Repo
        run: git status .
        working-directory: ${{ env.MY_HOMEBREW_CORE_REPO }}

      - name: Clean Homebrew Repo
        run: git restore . ; git clean -fd
        working-directory: ${{ env.MY_HOMEBREW_CORE_REPO }}

      - name: Check Homebrew Repo - Post Clean
        run: git status .
        working-directory: ${{ env.MY_HOMEBREW_CORE_REPO }}

      # 2. Cleanup the cloned homebrew-core repo to remove openssl@1.1 formulae.
      - name: Uninstall openssl@1.1
        run: brew uninstall openssl@1.1 || true ; brew cleanup

      # END OpenSSL v1.1 cleanup.

      # We also need to cleanup ruby@3.0 which `brew doctor` also complains about.
      - name: Uninstall ruby@3.0
        run: brew uninstall ruby@3.0 || true ; brew cleanup

      - name: Install Homebrew Bundler RubyGems
        run: brew install-bundler-gems

      # Remove anything that looks like a toolchain formula. Detecting this
      # by looking for formulas with three dashes is gross, but works.
      - run: brew ls --formula | grep -- '-.*-.*-.*' | xargs brew uninstall -f

      #- run: brew test-bot --verbose --only-setup

      #- run: brew test-bot --only-tap-syntax

      # crosstool-ng 1.28.0 (stable, bottled) carries the macOS
      # case-sensitive-filesystem support that originally needed --HEAD
      # (https://github.com/crosstool-ng/crosstool-ng/issues/1477).
      # Use the bottle so test-bot doesn't skip our formulae as having
      # "unbottled dependencies".
      - run: HOMEBREW_NO_SANDBOX=1 brew install crosstool-ng

      # Repeat HOMEBREW_NO_SANDBOX=1 inline since test-bot may bypass
      # the workflow-level env when re-execing for individual formula
      # installs.
      - run: HOMEBREW_NO_SANDBOX=1 brew test-bot --only-formulae --skip-dependents --skip-online-checks
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@main
        with:
          name: bottles
          path: "*.bottle.*"

      # The formula's install method copies the ct-ng build log to
      # /tmp/ct-ng-<formula>-build.log when the toolchain build fails.
      # Upload it for debugging.
      - name: Upload ct-ng build logs
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@main
        with:
          name: ct-ng-build-log
          path: /tmp/ct-ng-*
          if-no-files-found: ignore

      # `brew test-bot --only-formulae` exits 0 even when individual formulas
      # fail to build (it only annotates failures). Verify that bottles were
      # actually produced so the workflow fails when builds fail.
      - name: Verify bottles were produced
        if: github.event_name == 'pull_request'
        run: |
          if ! ls *.bottle.* >/dev/null 2>&1; then
            echo "::error::No bottles were produced; one or more formulas failed to build"
            exit 1
          fi
